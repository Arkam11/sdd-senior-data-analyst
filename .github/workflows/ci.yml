name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest faker pandas numpy

      - name: Lint with flake8
        run: |
          flake8 . --count --max-line-length=120 \
            --extend-ignore=E221,E127,E128,E126 \
            --exclude=.git,__pycache__ \
            --statistics

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short || echo "No tests yet"
